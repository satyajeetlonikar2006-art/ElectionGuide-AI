<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElectionGuide AI — Your Nonpartisan Civic Education Assistant</title>
  <meta name="description" content="ElectionGuide AI helps you understand elections, voter registration, and the democratic process. Free, nonpartisan civic education for every citizen.">
  <meta name="keywords" content="election guide, voter registration, civic education, voting, democracy, elections">

  <!-- Open Graph -->
  <meta property="og:title" content="ElectionGuide AI — Civic Education Assistant">
  <meta property="og:description" content="Understand elections, register to vote, and learn about the democratic process with your AI guide.">
  <meta property="og:type" content="website">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- ── Background Effects ─────────────────────────────────────────────── -->
  <div class="bg-effects">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- ── App Container ──────────────────────────────────────────────────── -->
  <div id="app" class="app-container">
    
    <!-- Header -->
    <header id="app-header" class="app-header">
      <div class="header-content">
        <div class="header-brand">
          <div class="header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </div>
          <div>
            <h1 class="header-title">ElectionGuide AI</h1>
            <p class="header-subtitle">Your nonpartisan civic education assistant</p>
          </div>
        </div>
        <div class="header-status">
          <span class="status-dot"></span>
          <span class="status-text">Online</span>
        </div>
      </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-area" class="chat-area">
      <div id="messages" class="messages-container">
        <!-- Messages render here -->
      </div>
    </main>

    <!-- Input Bar -->
    <footer id="input-bar" class="input-bar">
      <div class="input-container">
        <div class="input-wrapper">
          <textarea 
            id="message-input" 
            class="message-input" 
            placeholder="Ask about elections, voting, registration..." 
            rows="1"
            maxlength="500"
            aria-label="Type your message"
          ></textarea>
          <div class="char-count" id="char-count">
            <span id="char-current">0</span>/500
          </div>
        </div>
        <button id="send-btn" class="send-btn" aria-label="Send message" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-disclaimer">ElectionGuide AI is for educational purposes. Always verify with official sources.</p>
    </footer>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
